<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}FAH Explorer{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/app.css" />
  {% block head %}{% endblock %}
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/">FAH&nbsp;Explorer</a>
    <span class="tagline">Forensic Asset Hydrogeology</span>
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  {% block scripts %}{% endblock %}
</body>
</html>
